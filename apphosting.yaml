# Firebase App Hosting configuration for KalaSetu (Next.js SSR)
# Docs: https://firebase.google.com/docs/app-hosting/configure
#
# Set public env vars in the Firebase Console (Hosting > App Hosting > Settings > Environment)
# or paste from .env.example. Console values override this file.
#
# Create secrets before first deploy:
#   firebase apphosting:secrets:set FIREBASE_ADMIN_PRIVATE_KEY
#   firebase apphosting:secrets:set AUTH_SESSION_SECRET
#   firebase apphosting:secrets:set MIDDLEWARE_SECRET
#   firebase apphosting:secrets:grantaccess SECRET_NAME kalasethu

runConfig:
  cpu: 1
  memoryMiB: 1024
  minInstances: 0
  maxInstances: 20
  concurrency: 80

env:
  # --- Server secrets (Cloud Secret Manager) ---
  - variable: FIREBASE_ADMIN_PRIVATE_KEY
    secret: FIREBASE_ADMIN_PRIVATE_KEY
    availability:
      - BUILD
      - RUNTIME

  - variable: AUTH_SESSION_SECRET
    secret: AUTH_SESSION_SECRET
    availability:
      - RUNTIME

  - variable: MIDDLEWARE_SECRET
    secret: MIDDLEWARE_SECRET
    availability:
      - RUNTIME

  # --- Firebase Admin identifiers (set FIREBASE_ADMIN_CLIENT_EMAIL in Console) ---
  - variable: FIREBASE_ADMIN_PROJECT_ID
    value: kala-sethu
    availability:
      - BUILD
      - RUNTIME

  # FIREBASE_ADMIN_CLIENT_EMAIL — set in Firebase Console (BUILD + RUNTIME)
  # (App Hosting injects FIREBASE_WEBAPP_CONFIG at build when a Web App is linked,
  # but this project reads explicit NEXT_PUBLIC_* from lib/firebase/config.ts.)
  #
  # Required in Console (BUILD + RUNTIME):
  #   NEXT_PUBLIC_FIREBASE_API_KEY
  #   NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
  #   NEXT_PUBLIC_FIREBASE_PROJECT_ID
  #   NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
  #   NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
  #   NEXT_PUBLIC_FIREBASE_APP_ID
  #   NEXT_PUBLIC_FIREBASE_DATABASE_URL
  #   NEXT_PUBLIC_RECAPTCHA_SITE_KEY
  #   NEXT_PUBLIC_RAZORPAY_KEY_ID
  #   NEXT_PUBLIC_APP_URL  (your App Hosting URL, e.g. https://kalasethu--kala-sethu.us-east4.hosted.app)
  #   FIREBASE_ADMIN_CLIENT_EMAIL
