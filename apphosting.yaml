runConfig:
  cpu: 1
  memoryMiB: 1024
  minInstances: 0
  maxInstances: 20
  concurrency: 80

env:
  # ── Secrets (sensitive – stored in Google Cloud Secret Manager) ──────────────
  - variable: FIREBASE_ADMIN_PRIVATE_KEY
    secret: FIREBASE_ADMIN_PRIVATE_KEY
    availability:
      - RUNTIME

  - variable: FIREBASE_ADMIN_CLIENT_EMAIL
    secret: FIREBASE_ADMIN_CLIENT_EMAIL
    availability:
      - RUNTIME

  - variable: AUTH_SESSION_SECRET
    secret: AUTH_SESSION_SECRET
    availability:
      - RUNTIME

  - variable: MIDDLEWARE_SECRET
    secret: MIDDLEWARE_SECRET
    availability:
      - RUNTIME

  # ── Plain values (non-sensitive – safe to commit) ────────────────────────────
  - variable: FIREBASE_ADMIN_PROJECT_ID
    value: kala-sethu
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: kala-sethu
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: kala-sethu.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: kala-sethu.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "893006907886"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_DATABASE_URL
    value: https://kala-sethu-default-rtdb.firebaseio.com/
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_APP_URL
