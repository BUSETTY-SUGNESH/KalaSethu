# Local overrides for the Firebase App Hosting emulator.
# Created for `firebase emulators:start` — references the same secret names as apphosting.yaml.
# Run `firebase apphosting:config:export` to sync secrets for local emulation.
#
# Docs: https://firebase.google.com/docs/app-hosting/emulate

env:
  - variable: FIREBASE_ADMIN_PRIVATE_KEY
    secret: FIREBASE_ADMIN_PRIVATE_KEY

  - variable: AUTH_SESSION_SECRET
    secret: AUTH_SESSION_SECRET

  - variable: MIDDLEWARE_SECRET
    secret: MIDDLEWARE_SECRET
